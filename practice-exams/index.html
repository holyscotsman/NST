<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nutanix Practice Exams</title>
  <meta name="description" content="Nutanix Practice Exams — Practice Mode (instant feedback, untimed) and Exam Mode (timed, 80% to pass), driven by whichever question bank you choose." />
  <meta name="theme-color" content="#08060F" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237C4DFF' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect width='8' height='4' x='8' y='2' rx='1'/%3E%3Cpath d='M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2'/%3E%3Cpath d='m9 14 2 2 4-4'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- (C3-10) non-render-blocking: preload + swap on load; system-stack fallback renders immediately -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" /></noscript>

  <link rel="stylesheet" href="./styles.css" />

  <!-- Shared NST preferences: applies accessibility root classes before paint -->
  <script src="../shared/nst-prefs.js"></script>
</head>
<body>
  <div class="pe-bg" aria-hidden="true">
    <span class="pe-glow pe-glow--purple"></span>
    <span class="pe-glow pe-glow--blue"></span>
    <span class="pe-dots"></span>
  </div>

  <main id="pe-root" class="pe-root"></main>

  <noscript><div class="pe-fatal">Nutanix Practice Exams needs JavaScript enabled.</div></noscript>

  <!-- Config -->
  <script src="./config.js"></script>
  <!-- Question-bank framework: questions load at runtime from the active bank -->
  <script src="../shared/bank-parser.js"></script>
  <script src="../shared/bank-loader.js"></script>
  <!-- Engine + UI + modes -->
  <script src="./engine.js"></script>
  <script src="./sfx.js"></script>
  <script src="./ui.js"></script>
  <script src="./results.js"></script>
  <script src="./practice-mode.js"></script>
  <script src="./exam-mode.js"></script>
  <script src="./app.js"></script>
</body>
</html>
