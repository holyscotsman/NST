# CI for the Nutanix Study Tool.
# Runs each tool's dependency-free checks: WWTBANE's unit tests, and StarNix's
# build + pure logic harnesses (scheduler, grading, shuffle, timer, bank lint).
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  wwtbane:
    name: WWTBANE unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wwtbane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # The game and its unit tests use only Node built-ins — no install needed.
      - run: node --test tests/*.test.mjs

  starnix:
    name: StarNix build + logic harnesses
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starnix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Build the single-file app (zero-dependency) and run the pure harnesses.
      - run: node build.mjs
      - run: node bank-lint.mjs
      - run: node scheduler-test.mjs
      - run: node multi-answer-test.mjs
      - run: node shuffle-test.mjs
      - run: node timer-test.mjs
