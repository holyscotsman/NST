<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Chasm Chase — StarNix (standalone runner)</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --iris:#7855FA; --charcoal:#131313; --aqua:#1FDDE9; --mantis:#92DD23;
    --peach:#FF6B5B; --gold:#FFC857; --iris300:#AC9BFD; --iris600:#6D40E6; --ink:#F2F2F7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#05050b;color:var(--ink);font-family:Montserrat,Arial,sans-serif;overflow:hidden;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}
  #bar{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:8px 14px;background:rgba(13,13,22,.85);border-bottom:1px solid #23233a;z-index:50;}
  #bar h1{font-size:14px;font-weight:800;letter-spacing:.04em;margin:0;color:var(--iris300);}
  #bar h1 b{color:var(--aqua);}
  #bar .spacer{flex:1;}
  .pill{font-size:11px;color:#9a9aad;border:1px solid #34344a;border-radius:999px;padding:3px 9px;}
  button.act{font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;border:none;border-radius:9px;padding:8px 14px;color:#fff;background:linear-gradient(90deg,var(--iris),var(--iris600));}
  button.act.ghost{background:transparent;border:1.5px solid #34344a;color:var(--iris300);}
  #game{position:relative;flex:1 1 auto;min-height:0;}
  /* self-test drawer */
  #tests{position:absolute;top:0;right:0;width:min(440px,94vw);max-height:100%;overflow:auto;background:rgba(10,10,18,.97);
    border-left:1px solid #23233a;transform:translateX(100%);transition:transform .2s ease;z-index:60;padding:14px 16px 28px;}
  #tests.open{transform:translateX(0);}
  #tests h2{font-size:13px;margin:0 0 4px;color:var(--aqua);letter-spacing:.05em;}
  #tests .sub{font-size:11px;color:#7a7a8c;margin-bottom:12px;}
  #summary{font-weight:800;font-size:14px;margin:10px 0;padding:8px 10px;border-radius:8px;}
  #summary.ok{background:rgba(146,221,35,.14);color:var(--mantis);border:1px solid rgba(146,221,35,.4);}
  #summary.bad{background:rgba(255,107,91,.14);color:var(--peach);border:1px solid rgba(255,107,91,.4);}
  #summary.run{background:rgba(120,85,250,.14);color:var(--iris300);border:1px solid rgba(120,85,250,.4);}
  .grp{font-size:12px;font-weight:700;color:var(--iris300);margin:12px 0 4px;}
  .t{font-size:11.5px;line-height:1.5;padding:2px 0 2px 18px;position:relative;color:#c9c9d6;}
  .t::before{position:absolute;left:0;top:2px;}
  .t.p::before{content:'\2713';color:var(--mantis);}
  .t.f::before{content:'\2717';color:var(--peach);}
  .t.f{color:var(--peach);}
  #close{float:right;cursor:pointer;color:#7a7a8c;font-size:16px;line-height:1;border:none;background:none;}
  a{color:var(--aqua);}
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <h1>CHASM <b>CHASE</b></h1>
    <span class="pill" id="enginePill">engine: loading…</span>
    <span class="pill" id="hint">core appears ahead → a question pauses the run</span>
    <div class="spacer"></div>
    <button class="act ghost" id="btnPause">Pause</button>
    <button class="act ghost" id="btnTest">Run self-test</button>
    <button class="act" id="btnRestart">Restart run</button>
  </div>
  <div id="game"></div>

  <div id="tests">
    <button id="close" title="close">&times;</button>
    <h2>Headless logic self-test</h2>
    <div class="sub">Simulation, collision, shields/buffs, question pause/resume, mastery, speed, spawner-solvability &amp; pooling — run against the loaded build. Authoritative headless harness: <code>node cc-smoke.cjs</code>.</div>
    <div id="summary" class="run">Idle.</div>
    <div id="results"></div>
  </div>
</div>

<!-- Three.js via CDN (pinned UMD global, r128). The module degrades to logic-only
     if THREE / WebGL is unavailable, so the page still loads + self-tests pass. -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<!-- mock core installs window.StarNix FIRST, then cc.js auto-registers into it -->
<script src="mock-core.js"></script>
<script src="cc.js"></script>

<script>
(function () {
  'use strict';
  var gameEl = document.getElementById('game');
  var pill = document.getElementById('enginePill');
  pill.textContent = window.THREE ? ('engine: Three r' + (window.THREE.REVISION || '128')) : 'engine: logic-only (no WebGL)';
  if (!window.THREE) pill.style.color = 'var(--peach)';

  // Mount the game into the page container via the StarNix shell. Keep the handle so the
  // Pause/Resume button can drive the module's new pause()/resume() live.
  var handle = null, paused = false;
  var btnPause = document.getElementById('btnPause');
  function setPauseLabel() { btnPause.textContent = paused ? 'Resume' : 'Pause'; }
  function mount() {
    try { window.StarNix.unmountGame(); } catch (e) {}
    gameEl.innerHTML = '';
    handle = window.StarNix.mountGame('CC', gameEl);
    paused = false; setPauseLabel();
  }
  mount();
  document.getElementById('btnRestart').addEventListener('click', mount);
  btnPause.addEventListener('click', function () {
    if (!handle) return;
    paused = !paused;
    if (paused) { if (handle.pause) handle.pause(); } else { if (handle.resume) handle.resume(); }
    setPauseLabel();
  });

  // ---- self-test drawer ----
  var drawer = document.getElementById('tests');
  var results = document.getElementById('results');
  var summary = document.getElementById('summary');
  document.getElementById('btnTest').addEventListener('click', function () { drawer.classList.add('open'); runSelfTest(); });
  document.getElementById('close').addEventListener('click', function () { drawer.classList.remove('open'); });

  // In-page test runner over window.CC — current API; mirrors cc-smoke.cjs (sim-level + solvability + pooling).
  window.__runCCSelfTest = runSelfTest;   // automation hook (headless validation)
  function runSelfTest() {
    var CC = window.CC, MC = window.MockCore;
    var CCSim = CC.CCSim, CCView = CC.CCView, CONFIG = CC.CONFIG, E = CC._enums, FIXED = CONFIG.FIXED_DT;
    var pass = 0, fail = 0; results.innerHTML = '';
    summary.className = 'run'; summary.textContent = 'Running…';

    function grp(n) { var e = document.createElement('div'); e.className = 'grp'; e.textContent = n; results.appendChild(e); }
    function ok(cond, msg) { var d = document.createElement('div'); d.className = 't ' + (cond ? 'p' : 'f'); d.textContent = msg; results.appendChild(d); if (cond) pass++; else fail++; }
    function approx(a, b, e2) { return Math.abs(a - b) <= (e2 == null ? 1e-6 : e2); }
    function sim(seed, ov) { var c = MC.createMockCore({ seed: seed || 42 }); var s = new CCSim({ ctx: c, rng: c.rng.fork('CC'), config: ov || {} }); s.__c = c; return s; }
    function stepN(s, n) { for (var i = 0; i < n; i++) s.step(FIXED); }
    // keep a run alive (collisions off) and dismiss any question, so spawning never freezes. No rng consumed.
    function pump(s) { s.iframe = 1e6; s.step(FIXED); if (s.phase === 'QUESTION' && s.pending) { s.answer(s.pending.question.correctIndex); if (s.phase === 'EXPLAIN') s.resumeAfterQuestion(); s.iframe = 1e6; } }

    // 1. lane / jump / duck
    grp('Lane / jump / duck');
    var s = sim();
    s.moveLeft(); ok(s.player.lane === 0, 'moveLeft → lane 0'); s.moveLeft(); ok(s.player.lane === 0, 'clamps at 0');
    s.moveRight(); s.moveRight(); ok(s.player.lane === 2, 'moveRight → lane 2'); s.moveRight(); ok(s.player.lane === 2, 'clamps at 2');
    var j = sim(); j.jump(); var apex = 0; for (var k = 0; k < 200 && j.player.jumping; k++) { j.step(FIXED); if (j.player.y > apex) apex = j.player.y; }
    ok(approx(apex, CONFIG.JUMP_HEIGHT, 0.05), 'jump reaches apex'); ok(!j.player.jumping && approx(j.player.y, 0), 'auto-lands');
    var d = sim(); d.duck(); d.step(FIXED); ok(d.player.topY < CONFIG.PLAYER_H, 'duck lowers hitbox');
    var pq = sim(); pq.phase = 'QUESTION'; var ln = pq.player.lane; pq.moveRight(); ok(pq.player.lane === ln, 'inputs ignored when not RUN');

    // 2. collision (current rule-set) via the _wouldHit seam
    grp('Collision (narrow / low-rock / arch)');
    var cs = sim();
    ok(cs._wouldHit({ type: E.OB_NARROW, x: -CONFIG.LANE_W }, 0, 'stand') === true, 'narrow: sealed lane hit standing');
    ok(cs._wouldHit({ type: E.OB_NARROW, x: -CONFIG.LANE_W }, 0, 'jump') === true, 'narrow: STILL hit at jump apex (full height)');
    ok(cs._wouldHit({ type: E.OB_NARROW, x: -CONFIG.LANE_W }, 2, 'stand') === false, 'narrow: other lane clear');
    ok(cs._wouldHit({ type: E.OB_LOWROCK, x: 0 }, 1, 'stand') === true, 'low-rock: hit standing');
    ok(cs._wouldHit({ type: E.OB_LOWROCK, x: 0 }, 1, 'jump') === false, 'low-rock: cleared by jump');
    ok(cs._wouldHit({ type: E.OB_LOWROCK, x: 0 }, 0, 'stand') === false, 'low-rock: other lane clear');
    ok(cs._wouldHit({ type: E.OB_ARCH, x: 0 }, 0, 'stand') === true, 'arch: hit standing (lane 0)');
    ok(cs._wouldHit({ type: E.OB_ARCH, x: 0 }, 2, 'stand') === true, 'arch: lane-independent (lane 2)');
    ok(cs._wouldHit({ type: E.OB_ARCH, x: 0 }, 1, 'duck') === false, 'arch: cleared by duck');
    ok(cs._wouldHit({ type: E.OB_ARCH, x: 0 }, 1, 'jump') === true, 'arch: jump does NOT clear it');

    // 3. shields / game-over / hitFlash
    grp('Shields / game-over / hitFlash');
    var cc = sim();
    var ob = cc.obstacles.acquire(); ob.type = E.OB_NARROW; ob.lane = cc.player.lane; ob.side = E.SIDE_LEFT; ob.x = (cc.player.lane - 1) * CONFIG.LANE_W; ob.z = 0.0001; ob.tested = false;
    var sh0 = cc.shields; cc.step(FIXED);
    ok(cc.shields === sh0 - CONFIG.COLLISION_SHIELD_COST, 'crash costs a shield');
    ok(cc.hitFlash > 0, 'crash sets hitFlash (damage flash)'); var hf = cc.hitFlash; cc.step(FIXED); ok(cc.hitFlash < hf, 'hitFlash decays');
    var bi = sim(); bi._grantBuff('invincible'); ok(bi.buffs.invincible > 0, 'invincible granted');
    stepN(bi, Math.ceil(CONFIG.BUFF_INVINCIBLE / FIXED) + 6); ok(bi.buffs.invincible <= 0, 'invincible expires');
    var go = sim();
    for (var z = 0; z < CONFIG.SHIELDS_START + 2 && go.phase !== 'OVER'; z++) { go.iframe = 0; var o2 = go.obstacles.acquire(); o2.type = E.OB_NARROW; o2.lane = go.player.lane; o2.side = E.SIDE_LEFT; o2.x = (go.player.lane - 1) * CONFIG.LANE_W; o2.z = 0.0001; o2.tested = false; go.step(FIXED); }
    ok(go.shields === 0 && go.phase === 'OVER', '0 shields → game over');

    // 4. question flow + mastery + telemetry
    grp('Question flow + mastery + telemetry');
    var qs = sim(); var core = qs.cores.acquire(); core.lane = qs.player.lane; core.x = (qs.player.lane - 1) * CONFIG.LANE_W; core.z = 0.0001; core.tested = false; core.power = false; core.kind = '';
    qs.step(FIXED);
    ok(qs.phase === 'QUESTION' && qs.pending, 'core collect → QUESTION (paused)');
    var dist0 = qs.distance; stepN(qs, 120); ok(approx(qs.distance, dist0), 'world frozen during question');
    var q = qs.pending.question; var res = qs.answer(q.correctIndex);
    ok(res && res.correct && qs.phase === 'EXPLAIN', 'correct → EXPLAIN (stays paused)');
    ok(qs.__c.mastery.get(q.id) && qs.__c.mastery.get(q.id).correct === 1, 'mastery.record written');
    qs.resumeAfterQuestion(); ok(qs.phase === 'RUN' && qs.iframe >= CONFIG.POST_Q_GRACE - 1e-6, 'resume → RUN + post-question grace');
    stepN(qs, 10); ok(qs.distance > dist0, 'advances after resume');
    ok(qs.__c.telemetry.events.filter(function (e) { return e.t === 'question_answered'; }).length === 1, 'question_answered emitted');
    var wr = sim(); var c2 = wr.cores.acquire(); c2.lane = wr.player.lane; c2.x = (wr.player.lane - 1) * CONFIG.LANE_W; c2.z = 0.0001; c2.tested = false; wr.step(FIXED);
    var q2 = wr.pending.question, sh = wr.shields; wr.answer((q2.correctIndex + 1) % q2.options.length); ok(wr.shields === sh - 1, 'wrong answer costs a shield');

    // 5. speed invariant + ramp/cap
    grp('Speed invariant + ramp');
    ok(CONFIG.MIN_GAP >= CONFIG.MAX_SPEED * CONFIG.JUMP_TIME, 'MIN_GAP ≥ MAX_SPEED·JUMP_TIME (' + CONFIG.MIN_GAP + ' ≥ ' + (CONFIG.MAX_SPEED * CONFIG.JUMP_TIME).toFixed(1) + ')');
    var sp = sim(); ok(approx(sp.speed, CONFIG.BASE_SPEED), 'starts at BASE_SPEED');
    for (var i5 = 0; i5 < 14000; i5++) pump(sp);
    ok(sp.speed === CONFIG.MAX_SPEED, 'caps at MAX_SPEED'); ok(sp.distance > 5000, 'distance accumulates (' + Math.floor(sp.distance) + 'm)');

    // 6. spawner solvability (every row has a clearing lane+action) + pooling stability
    grp('Spawner solvability + pooling');
    var ACT = ['stand', 'jump', 'duck'], seeds = [7, 2025];
    for (var sidx = 0; sidx < seeds.length; sidx++) {
      var sv = sim(seeds[sidx]); var seen = Object.create(null), rows = 0, bad = 0;
      for (var t = 0; t < 7000; t++) {
        pump(sv);
        var it = sv.obstacles.items, byZ = Object.create(null), x;
        for (x = 0; x < it.length; x++) { var o = it[x]; if (o.active && o.z > 0.5) { var key = o.z.toFixed(3); (byZ[key] || (byZ[key] = [])).push(o); } }
        for (var key in byZ) {
          if (seen[key]) continue; seen[key] = 1; rows++;
          var row = byZ[key], solv = false;
          for (var L = 0; L < 3 && !solv; L++) for (var a = 0; a < 3 && !solv; a++) { var cl = true; for (var ri = 0; ri < row.length; ri++) if (sv._wouldHit(row[ri], L, ACT[a])) { cl = false; break; } if (cl) solv = true; }
          if (!solv) bad++;
        }
      }
      ok(rows > 50 && bad === 0, 'seed ' + seeds[sidx] + ': every row clearable (' + rows + ' rows)');
      var rep = sv.poolReport(), poolOk = true;
      ['obstacles', 'coins', 'cores'].forEach(function (nm) { var r = rep[nm]; if (r.factoryCalls !== r.cap || r.balance !== r.live || r.exhaustions !== 0) poolOk = false; });
      ok(poolOk, 'seed ' + seeds[sidx] + ': pools stable (no growth/leak/exhaustion)');
    }

    // 7. mount / unmount + pause/resume surface (live DOM + THREE if present)
    grp('Mount / unmount + pause/resume');
    var mod = CC.createCCModule();
    ok(typeof mod.pause === 'function' && typeof mod.resume === 'function', 'module exposes pause()/resume()');
    var probe = document.createElement('div'); probe.style.cssText = 'position:absolute;width:300px;height:200px;left:-9999px;top:-9999px;'; document.body.appendChild(probe);
    var threw = false; try { mod.mount(probe, MC.createMockCore({ seed: 5 })); } catch (e) { threw = true; }
    ok(!threw && probe.children.length >= 1, 'mounts into a container');
    var noThrow = true; try { mod.pause(); mod.resume(); } catch (e) { noThrow = false; }
    ok(noThrow, 'pause()/resume() run while mounted without throwing');
    try { mod.unmount(); } catch (e) { threw = true; }
    ok(!threw && probe.children.length === 0, 'unmount clears the container');
    document.body.removeChild(probe);

    summary.className = fail ? 'bad' : 'ok';
    summary.textContent = fail ? (pass + ' passed, ' + fail + ' FAILED') : ('ALL GREEN — ' + pass + ' checks passed');
  }
})();
</script>
</body>
</html>
